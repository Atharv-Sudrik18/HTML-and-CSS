</htm<!DOCTYPE html>
<html>
<head>
  <title>Disply property</title>
</head>
<style> 
          .inline{
            
            border:2px solid rgb(227, 119, 119);
            padding:20px;
            margin:20px;
            display:inline;
          }

          .inlineblock{
            
            border:2px solid rgb(227, 119, 119);
            padding:20px;
            margin:20px;
            display:inline-block;
          }
           
       .hide{
         display:none;
       }

</style>
<body>
         
  
  <div class="inline">html</div>
   <div class="inline">java script</div>
   <div class="inline">css</div>
  
    
  <div class="inlineblock">html</div>
   <div class="inlineblock">java script</div>
   <div class="inlineblock">css</div>
  
  <h2>display none</h2>
  <p class ="hide">Paragraph is hidden</p>
  <p>paragraph is visible</p>

</body>
</html>
