<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Job Application Form</title>
</head>
<body>
  <h1>
    Job Application Form
  </h1

  <form action =“success.html” method=“post”>
    
         <label for ="c_name">Enter Full  Name:</label>
         <input type="text" name="c_name" id="c_name"  placeholder="Enter Full name" maxlength="30" required>
         <br><br>
    
         <label for="c_email">Enter Email Address:</label>
         <input type="email" name="c_email"  placeholder="Enter Email Address" required>
         <br><br>

         <label for="c_phone">Enter Mobile Number:</label>
         <input type="number" name="c_phone"  placeholder="Enter Mobile Number" required>
         <br><br>
         
         Select The position Applying For:
         <select name=“position” id=“position” required><br>
         <option value=“pos1”>Software Developer</option>
         <option value=“pos2”>UI Desiginer</option>
         <option value=“pos3”>Database Administrator</option>
         <option value=“pos4”>Marketing Executive</option>
         <option value=“pos5”>Cloud Engineer</option>
         <option value=“pos6”>AI Engineer</option>
         <option value=“pos7”>Data Analyst</option>
         </select>
         <br><br>

         <label for ="C_Experience">Specify Experience level:</label>
         <input type="text" name="C_Experience" id="C_Experience"  placeholder="Experience level" maxlength="30" required>
         <br><br>

         
         Select Technical Skills:
         <select name=“Skill” id="Skill" required><br>
         <option value=“skill1”>Web Development</option>
         <option value=“skill2”>Database Management</option>
         <option value=“skill3”>Networking</option>
         <option value=“skill4”>Cybersecurity</option>
         <option value=“skill5”>Software testing</option>
         <option value=“skill6”>Data Analysis</option>
         <option value=“skill6”>Cloud Computing</option>
         </select>
         <br><br>

         <label for ="C_url">Enter portfolio Website URL:</label>
         <input type="url" name="C_url" id="C_url"  placeholder="portfolio URL" maxlength="30" required>
         <br><br>

         <label for ="
         <label for ="C_Resume">Upload Resume:</label>
         <input type="file" name="C_Resume" id="C_Resume" required>
         <br><br>
    
         Write a Cover Letter:<br><br>
         <textarea name =“Letter” rows="40" cols="40" placeholder="Write a Cover Letter" required></textarea>
         <br><br>
                    
         <input type="submit" > 
         <input type="reset" >

</form>
</body>
</html>
