<!DOCTYPE html>
<html>
<head>
    <title>Product Search Form</title>
</head>
<body>
     <marquee behavior="slide" scrollamount ="10" style="background-color: orange"
     <h1>Product Search Form</h1>
     </marquee/>
    <form>

      
        <label for="product">Search Product Name:</label>
        <input type="text" id="product" name="product"
               list="productlist"
               placeholder="Enter product name">
       
        <datalist id="productlist">
            <option value="Laptop">
            <option value="Mouse">
            <option value="Keyboard">
            <option value="Monitor">
            <option value="Printer">
            <option value="Smartphone">
        </datalist>
        <br><br>

       
        <label for="category">Select Product Category:</label>
        <select id="category" name="category">
            <option value="">--Select Category--</option>
            <option>Electronics</option>
            <option>Computer Accessories</option>
            <option>Mobile Phones</option>
            <option>Office Equipment</option>
        </select>

        <br><br>

       
        <label for="brand">Choose Preferred Brand:</label>
        <select id="brand" name="brand">
            <option value="">--Select Brand--</option>
            <option>Dell</option>
            <option>HP</option>
            <option>Lenovo</option>
            <option>Logitech</option>
            <option>Samsung</option>
            <option>Apple</option>
        </select>

        <br><br>

        
        <label for="minprice">Minimum Price:</label>
        <input type="number" id="minprice" name="minprice">

        <br><br>

        <label for="maxprice">Maximum Price:</label>
        <input type="number" id="maxprice" name="maxprice">

        <br><br>

        
        <input type="submit" value="Search">
        <input type="reset" value="Clear">

    </form>
              
              
                  
                  
             
               

</body>
</html>
