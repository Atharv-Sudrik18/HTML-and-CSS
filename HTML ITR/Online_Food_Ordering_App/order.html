<!DOCTYPE html>
<html>
<head>
    <title>Online Food Ordering App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Tasty Town </h1> 
    <h2>Place Your Order</h2>
    <hr>

    
    <!--Nevigation links-->
    <a href="index.html">Home</a> |
    <a href="menu.html">Menu</a> |
    <a href="order.html">order</a>  |
    <a href="contact.html">Contact us</a>  |
    <hr>

    <form action="sucs.html">
 
    
         <label for ="c_name">Customer Name:</label>
         <input type="text" name="c_name" id="c_name"  placeholder="Customer name" maxlength="30" required>
         <br><br>
      
         <label for="c_email">Customer Email :</label>
         <input type="email" name="c_email"  placeholder="Email" required>
         <br><br>
 

         <label for="c_mobile">Customer Mobile:</label>
         <input type="text" name="c_mobile"  placeholder="Mobile" maxlength="10"required>
         <br><br>

  
         Select Food Item:
         <select name=“Fooditem” id=“Fooditem” required><br>
         <option value=“Burger">Veg Burger</option>
         <option value=“Pizza”>Cheese Pizza</option>
         <option value=“Fries”>French fries</option>
         <option value="SandWitch">Veg SandWitch</option>
         <option value=“coffee”>Cold Coffee</option>
         <option value=“cake”>Chocolate Cake</option>
         </select>
         <br><br>
 
         <label for="quantity">Quantity:</label>
         <input type="number" name="quantity" min="1" max="10"required>
         <br><br>


         Delivery Address:
         <textarea name="Address" rows="5" cols="30" placeholder="Delivery Address" required></textarea>
         <br><br> 
         
          Payment Method:
         <input type="radio" id="Payment" name="Payment" value="Cash on Delivery"/>Cash on Delivery   
         <input type="radio" id="Payment" name="Payment" value="UPI"/>UPI
         <br><br>  
         
         <input type="submit" value="Place Order ">
         <input type="reset" value="Cancel Order" >

</form>
<hr>

<p><b>Note:</b>Orders will be Delivered within 30-45 minutes.</p>
</body>
</html>
